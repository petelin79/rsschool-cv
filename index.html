<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore the beauty of the World</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aleo:wght@700&family=Magra:wght@700&family=Red+Hat+Text:wght@500&family=Roboto:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <div class="wrapper">
        <div class="wrapper__header">
          <div class="header__logo">
            <div>
              <a href="/" class="header__logo-link"
              ><img
              class="header__logo-pic"
                src="/assets/img/svg/logo.svg"
                alt=""
              />
            </div>
              <div class="header__name">
                <small>Travel Portal</small>
              </div>
            </a>
          </div>
          <nav class="header__nav">
            <ul class="header__list">
              <li class="header__item">
                <a href="#" class="header__link">How It Works</a>
              </li>
              <li class="header__item">
                <a href="#" class="header__link">Plan Your Trip</a>
              </li>
              <li class="header__item">
                <a href="#" class="header__link">Destinations</a>
              </li>
              <li class="header__item">
                <a href="#" class="header__link">Travel Stories</a>
              </li>
            </ul>
          </nav>
          <button class="header__btn">
            <small class="header__btn-txt">Login</small></button>
        </div>
      </div>
    </header>
    <main class="main">
      <section class="plan">
        <div class="wrapper">
          <div class="wrapper__plan">
            <div class="plan__title">
            <h1>Explore the beauty of the World</h1>
            </div>
            <div class="plan__descr">
              <p>Receive personalized recommendations for countries, hotels, activities and more</p> 
            </div>
            <div class="plan__search">
              <div class="plan__search-block">
                <form action="" class="search-form">
                  <fieldset class="search-form_wrap">
                    <p class="search-form__info">
                      <input class="search-form__field" type="text" placeholder="What would you like to do?">
                    </p>
                  </fieldset>
                </form>
                <div class="search-form__btn">
                  <button type="submit" class="search-form__submit">
                    <small class="search-form__btn-text" >Start Planning</small>
                  </button>
              </div>

            </div>
          </div>

        </div>
      </section>
    </main>
  </body>
</html>
